<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Chart Line -->
  <path d="M15,80 L35,55 L55,65 L85,25" fill="none" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Cart Body / Basket -->
  <path d="M25,35 L40,35 L48,58 L72,58 L80,35 M48,58 L45,68 L75,68" fill="none" stroke="url(#logo-grad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wheels -->
  <circle cx="48" cy="76" r="5" fill="url(#logo-grad)"/>
  <circle cx="72" cy="76" r="5" fill="url(#logo-grad)"/>
  <!-- Chart Nodes -->
  <circle cx="15" cy="80" r="4" fill="#6366f1" />
  <circle cx="35" cy="55" r="4" fill="#6366f1" />
  <circle cx="55" cy="65" r="4" fill="#10b981" />
  <circle cx="85" cy="25" r="5" fill="#10b981" filter="url(#glow)"/>
</svg>
